<!doctype html>
<html lang="en">
  <head data-react-helmet="true">
    <!-- The first thing in any HTML file should be the charset -->
    <meta charset="utf-8" />

    <!-- Make the page mobile compatible -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Allow installing the app to the homescreen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent" />
    <meta name="theme-color" content="#eee2d5" />

    <!-- Page title (React Helmet can override) -->
    <title data-react-helmet="true">{{PAGE_TITLE}}</title>

    <!-- Open Graph meta tags (React Helmet can override) -->
    <meta property="og:title" content="{{OG_TITLE}}" data-react-helmet="true" />
    <meta
      property="og:description"
      content="{{OG_DESCRIPTION}}"
      data-react-helmet="true" />
    <meta property="og:image" content="{{OG_IMAGE}}" data-react-helmet="true" />
    <meta property="og:url" content="{{OG_URL}}" data-react-helmet="true" />
    <meta property="og:type" content="{{OG_TYPE}}" data-react-helmet="true" />
    <meta
      property="og:site_name"
      content="{{SITE_NAME}}"
      data-react-helmet="true" />

    <!-- Twitter Card meta tags (React Helmet can override) -->
    <meta
      name="twitter:card"
      content="{{TWITTER_CARD}}"
      data-react-helmet="true" />
    <meta
      name="twitter:title"
      content="{{TWITTER_TITLE}}"
      data-react-helmet="true" />
    <meta
      name="twitter:description"
      content="{{TWITTER_DESCRIPTION}}"
      data-react-helmet="true" />
    <meta
      name="twitter:image"
      content="{{TWITTER_IMAGE}}"
      data-react-helmet="true" />

    <!-- Additional meta tags (React Helmet can override) -->
    <meta
      name="description"
      content="{{META_DESCRIPTION}}"
      data-react-helmet="true" />
    <meta name="author" content="{{META_AUTHOR}}" data-react-helmet="true" />
    <meta name="robots" content="index, follow" data-react-helmet="true" />

    <!-- Fallback meta tags for social crawlers (when React Helmet is not available) -->
    <meta property="og:title" content="Base - Human-in-the-Loop System" />
    <meta
      property="og:description"
      content="Agentic knowledge base management and execution system" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <!-- Display a message if JS has been disabled on the browser. -->
    <noscript
      >If you're seeing this message, that means
      <strong>JavaScript has been disabled on your browser</strong>, please
      <strong>enable JS</strong> to make this app work.</noscript
    >

    <!-- The app hooks into this div -->
    <div id="app"></div>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;600;700&family=Inter:wght@100;200;400;900&family=Roboto+Mono:wght@100;200;300;400;600;700&family=Montserrat:wght@100;300&display=swap"
      rel="stylesheet" />

    <!-- Dynamic JavaScript bundles injected at runtime -->
    {{SCRIPT_TAGS}}
  </body>
</html>
