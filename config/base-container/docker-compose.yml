services:
  base-container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: base-container
    init: true
    restart: unless-stopped
    environment:
      - GIT_AUTHOR_NAME=trashman
      - GIT_AUTHOR_EMAIL=trashman@users.noreply.github.com
      - GIT_COMMITTER_NAME=trashman
      - GIT_COMMITTER_EMAIL=trashman@users.noreply.github.com

  camofox-browser:
    image: ghcr.io/redf0x1/camofox-browser:latest
    container_name: camofox-browser
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9377/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
